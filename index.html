<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дух Громади AI1</title>
    <style>
        :root { --green: #1b4332; --accent: #40916c; --bg: #f0fdf4; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .chat-container { width: 95%; max-width: 500px; background: white; height: 85vh; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.15); display: flex; flex-direction: column; overflow: hidden; border: 1px solid #c7d5c7; }
        .header { background: var(--green); color: white; padding: 18px; text-align: center; font-size: 1.1em; font-weight: bold; letter-spacing: 1px; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; background: #ffffff; }
        .msg { padding: 12px 16px; border-radius: 15px; max-width: 85%; line-height: 1.5; font-size: 15px; word-wrap: break-word; }
        .user { align-self: flex-end; background: var(--accent); color: white; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: #f1f3f1; color: #1b4332; border-bottom-left-radius: 2px; }
        .status-msg { align-self: center; font-size: 12px; color: #666; font-style: italic; margin: 5px; }
        .input-area { padding: 15px; background: white; display: flex; gap: 10px; border-top: 1px solid #eee; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 10px; outline: none; font-size: 16px; }
        button { background: var(--green); color: white; border: none; padding: 0 20px; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">🌿 ДУХ ЯЗИЧНИЦЬКОЇ ГРОМАДИ!</div>
    <div id="chat-box">
        <div class="msg ai">Вітаю, Андрію. Я готовий до віче. Про що хочеш спитати?</div>
    </div>
    <div id="status-line" class="status-msg"></div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Напишіть Духу..." autocomplete="off">
        <button id="send-btn">ВІДПРАВИТИ</button>
    </div>
</div>

<script>
    // === ВСТАВТЕ ВАШ ТОКЕН ТУТ ===
    const HF_TOKEN = "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"; 

    // Використовуємо Qwen 2.5 7B - вона зараз найкраща для безкоштовного API
    const API_URL = "https://api-inference.huggingface.co/models/Qwen/Qwen2.5-7B-Instruct";

    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const statusLine = document.getElementById('status-line');

    async function askAI() {
        const text = userInput.value.trim();
        if (!text || sendBtn.disabled) return;

        // Додаємо повідомлення користувача
        appendMessage(text, 'user');
        userInput.value = '';
        sendBtn.disabled = true;
        statusLine.innerText = "Дух з'єднується з капіщем...";

        try {
            const response = await fetch(API_URL, {
                method: "POST",
                headers: { 
                    "Authorization": `Bearer ${HF_TOKEN}`, 
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    inputs: `<|im_start|>system\nТи — мудрий Дух Язичницької Громади. Ти підтримуєш кельтське язичництво, соціал-демократію та еко-центризм. Твоя мова — чиста українська. Відповідай коротко.<|im_end|>\n<|im_start|>user\n${text}<|im_end|>\n<|im_start|>assistant\n`,
                    parameters: { max_new_tokens: 500, temperature: 0.7 }
                }),
            });

            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.error || `Помилка сервера: ${response.status}`);
            }

            const result = await response.json();
            
            let aiText = "";
            if (Array.isArray(result)) {
                aiText = result[0].generated_text.split('assistant\n').pop().trim();
            } else {
                aiText = "Дух не зміг відповісти. Спробуй ще раз.";
            }

            appendMessage(aiText, 'ai');
            statusLine.innerText = "";

        } catch (e) {
            console.error(e);
            appendMessage(`Помилка: ${e.message}. Перевірте токен або спробуйте через хвилину.`, 'ai');
            statusLine.innerText = "Зв'язок перервано.";
        } finally {
            sendBtn.disabled = false;
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    }

    function appendMessage(text, type) {
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerText = text;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    sendBtn.onclick = askAI;
    userInput.onkeypress = (e) => { if(e.key === 'Enter') askAI(); };
</script>

</body>
</html>
