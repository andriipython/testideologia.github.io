<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дух Громади AI</title>
    <style>
        :root { --green: #1b4332; --accent: #40916c; --bg: #f0fdf4; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .chat-container { width: 95%; max-width: 500px; background: white; height: 85vh; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; border: 1px solid #c7d5c7; }
        .header { background: var(--green); color: white; padding: 18px; text-align: center; font-weight: bold; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; background: #ffffff; }
        .msg { padding: 12px 16px; border-radius: 15px; max-width: 85%; line-height: 1.5; font-size: 15px; }
        .user { align-self: flex-end; background: var(--accent); color: white; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: #f1f3f1; color: #1b4332; border-bottom-left-radius: 2px; }
        .status { text-align: center; font-size: 12px; color: #888; padding: 5px; }
        .input-area { padding: 15px; background: white; display: flex; gap: 10px; border-top: 1px solid #eee; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 10px; outline: none; font-size: 16px; }
        button { background: var(--green); color: white; border: none; padding: 0 20px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        button:disabled { opacity: 0.5; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">🌿 ДУХ ЯЗИЧНИЦЬКОЇ ГРОМАДИ</div>
    <div id="chat-box">
        <div class="msg ai">Вітаю, Андрію. Віче розпочато. Яке твоє питання?</div>
    </div>
    <div id="status" class="status"></div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Напишіть Духу..." autocomplete="off">
        <button id="send-btn">ВІДПРАВИТИ</button>
    </div>
</div>

<script>
    // === 1. ВСТАВТЕ ВАШ ТОКЕН ТУТ ===
    const HF_TOKEN = "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"; 

    // === 2. НОВИЙ URL ROUTER ===
    const API_URL = "https://router.huggingface.co/hf-inference/v1/chat/completions";
    const MODEL_ID = "Qwen/Qwen2.5-7B-Instruct";

    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const status = document.getElementById('status');

    async function askAI() {
        const text = userInput.value.trim();
        if (!text || sendBtn.disabled) return;

        appendMessage(text, 'user');
        userInput.value = '';
        sendBtn.disabled = true;
        status.innerText = "Дух збирає віче...";

        try {
            const response = await fetch(API_URL, {
                method: "POST",
                headers: { 
                    "Authorization": `Bearer ${HF_TOKEN}`, 
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: MODEL_ID,
                    messages: [
                        { role: "system", content: "Ти — мудрий Дух Язичницької Громади. Твої цінності: кельтська традиція, соціал-демократія, екологічність. Відповідай мудро, коротко і тільки українською мовою." },
                        { role: "user", content: text }
                    ],
                    max_tokens: 500,
                    temperature: 0.7
                }),
            });

            const result = await response.json();

            if (!response.ok) {
                throw new Error(result.error?.message || result.error || "Помилка зв'язку");
            }

            // Новий роутер повертає формат OpenAI: result.choices[0].message.content
            const aiText = result.choices[0].message.content.trim();
            appendMessage(aiText, 'ai');
            status.innerText = "";

        } catch (e) {
            console.error("Деталі помилки:", e);
            appendMessage(`Помилка: ${e.message}`, 'ai');
            status.innerText = "Зв'язок перервано.";
        } finally {
            sendBtn.disabled = false;
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    }

    function appendMessage(text, type) {
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerText = text;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    sendBtn.onclick = askAI;
    userInput.onkeypress = (e) => { if(e.key === 'Enter') askAI(); };
</script>

</body>
</html>
